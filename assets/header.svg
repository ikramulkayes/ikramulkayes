<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" role="img" aria-label="MD Ikramul Kayes, Backend and AI Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.5" stop-color="#0e75b6"/>
      <stop offset="1" stop-color="#6f42c1"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.5" stop-color="#6f42c1"/>
      <stop offset="1" stop-color="#0e75b6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="round"><rect x="0" y="0" width="1200" height="280" rx="18"/></clipPath>
    <style>
      .float1 { transform-box: fill-box; transform-origin: center; animation: fl1 6s ease-in-out infinite; }
      .float2 { transform-box: fill-box; transform-origin: center; animation: fl2 7s ease-in-out infinite; }
      .float3 { transform-box: fill-box; transform-origin: center; animation: fl3 8s ease-in-out infinite; }
      .pulse  { animation: pl 9s ease-in-out infinite; }
      .sweep  { transform-box: fill-box; animation: sw 6s ease-in-out infinite; }
      .grow   { transform-box: fill-box; transform-origin: center; transform: scaleX(0); animation: gw 0.9s ease-out 0.6s forwards; }
      .reveal { opacity: 0; transform-box: fill-box; animation: rv 1s ease-out forwards; }
      .d1 { animation-delay: 0.1s; } .d2 { animation-delay: 0.85s; } .d3 { animation-delay: 1.05s; }
      @keyframes fl1 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-16px); } }
      @keyframes fl2 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(14px); } }
      @keyframes fl3 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
      @keyframes pl  { 0%,100% { opacity: 0; } 50% { opacity: 0.9; } }
      @keyframes sw  { 0% { transform: translateX(-500px) skewX(-18deg); } 55%,100% { transform: translateX(1400px) skewX(-18deg); } }
      @keyframes gw  { to { transform: scaleX(1); } }
      @keyframes rv  { 0% { opacity: 0; transform: translateY(18px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
  </defs>

  <g clip-path="url(#round)">
    <rect x="0" y="0" width="1200" height="280" fill="url(#bg)"/>
    <rect class="pulse" x="0" y="0" width="1200" height="280" fill="url(#bg2)"/>

    <g fill="#ffffff" opacity="0.06">
      <circle class="float1" cx="1050" cy="60" r="120"/>
      <circle class="float2" cx="1150" cy="220" r="80"/>
      <circle class="float3" cx="120" cy="230" r="90"/>
    </g>

    <g fill="#ffffff" opacity="0.10" font-family="'Fira Code','Consolas',monospace" font-size="16">
      <text x="60" y="60">{ }</text>
      <text x="1020" y="150">&lt;/&gt;</text>
      <text x="90" y="120">def agent():</text>
    </g>

    <text class="reveal d1" x="600" y="128" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="66" font-weight="700" fill="#ffffff" letter-spacing="1">MD Ikramul Kayes</text>

    <rect class="grow" x="430" y="152" width="340" height="3" rx="1.5" fill="url(#line)"/>

    <text class="reveal d2" x="600" y="200" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="25" font-weight="500" fill="#e6f0fa" letter-spacing="0.5">Backend and AI Engineer</text>

    <text class="reveal d3" x="600" y="236" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="17" fill="#bcd6ee" letter-spacing="2">VOICE AGENTS  •  RAG  •  n8n  •  LLM ROUTING</text>

    <rect class="sweep" x="0" y="0" width="150" height="280" fill="url(#shine)"/>
  </g>
</svg>
