<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" role="img" aria-label="MD Ikramul Kayes, Backend and AI Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.5" stop-color="#0e75b6"/>
      <stop offset="1" stop-color="#6f42c1"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="280" rx="18" fill="url(#bg)"/>

  <g fill="#ffffff" opacity="0.06">
    <circle cx="1050" cy="60" r="120"/>
    <circle cx="1150" cy="220" r="80"/>
    <circle cx="120" cy="230" r="90"/>
  </g>

  <g fill="#ffffff" opacity="0.10" font-family="'Fira Code','Consolas',monospace" font-size="16">
    <text x="60" y="60">{ }</text>
    <text x="1020" y="150">&lt;/&gt;</text>
    <text x="90" y="120">def agent():</text>
  </g>

  <text x="600" y="128" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="66" font-weight="700" fill="#ffffff" letter-spacing="1">MD Ikramul Kayes</text>

  <rect x="430" y="152" width="340" height="3" rx="1.5" fill="url(#line)"/>

  <text x="600" y="200" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="25" font-weight="500" fill="#e6f0fa" letter-spacing="0.5">Backend and AI Engineer</text>

  <text x="600" y="236" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="17" fill="#bcd6ee" letter-spacing="2">VOICE AGENTS  •  RAG  •  n8n  •  LLM ROUTING</text>
</svg>
