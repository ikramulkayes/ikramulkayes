<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" role="img" aria-label="MD Ikramul Kayes, Backend and AI Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.5" stop-color="#0e75b6"/>
      <stop offset="1" stop-color="#6f42c1"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.5" stop-color="#6f42c1"/>
      <stop offset="1" stop-color="#0e75b6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="round"><rect x="0" y="0" width="1200" height="280" rx="18"/></clipPath>
    <style>
      @keyframes pulse { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
      @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
      @keyframes floaty2 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(12px); } }
      @keyframes sweep { 0% { transform: translateX(-400px) skewX(-18deg); } 60%,100% { transform: translateX(1320px) skewX(-18deg); } }
      @keyframes fadeUp { 0% { opacity: 0; transform: translateY(18px); } 100% { opacity: 1; transform: translateY(0); } }
      @keyframes grow { 0% { transform: scaleX(0); } 100% { transform: scaleX(1); } }
      .layer2 { animation: pulse 9s ease-in-out infinite; }
      .c1 { animation: floaty 6s ease-in-out infinite; }
      .c2 { animation: floaty2 7s ease-in-out infinite; }
      .c3 { animation: floaty 8s ease-in-out infinite; }
      .shine { animation: sweep 6s ease-in-out infinite; }
      .name { opacity: 0; animation: fadeUp 1.1s ease-out 0.1s forwards; }
      .uline { transform-origin: 600px 153px; transform: scaleX(0); animation: grow 1s ease-out 0.6s forwards; }
      .role { opacity: 0; animation: fadeUp 1.1s ease-out 0.8s forwards; }
      .sub  { opacity: 0; animation: fadeUp 1.1s ease-out 1s forwards; }
    </style>
  </defs>

  <g clip-path="url(#round)">
    <rect x="0" y="0" width="1200" height="280" fill="url(#bg)"/>
    <rect class="layer2" x="0" y="0" width="1200" height="280" fill="url(#bg2)"/>

    <g fill="#ffffff" opacity="0.06">
      <circle class="c1" cx="1050" cy="60" r="120"/>
      <circle class="c2" cx="1150" cy="220" r="80"/>
      <circle class="c3" cx="120" cy="230" r="90"/>
    </g>

    <g fill="#ffffff" opacity="0.10" font-family="'Fira Code','Consolas',monospace" font-size="16">
      <text x="60" y="60">{ }</text>
      <text x="1020" y="150">&lt;/&gt;</text>
      <text x="90" y="120">def agent():</text>
    </g>

    <text class="name" x="600" y="128" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="66" font-weight="700" fill="#ffffff" letter-spacing="1">MD Ikramul Kayes</text>

    <rect class="uline" x="430" y="152" width="340" height="3" rx="1.5" fill="url(#line)"/>

    <text class="role" x="600" y="200" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="25" font-weight="500" fill="#e6f0fa" letter-spacing="0.5">Backend and AI Engineer</text>

    <text class="sub" x="600" y="236" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="17" fill="#bcd6ee" letter-spacing="2">VOICE AGENTS  •  RAG  •  n8n  •  LLM ROUTING</text>

    <rect class="shine" x="0" y="0" width="150" height="280" fill="url(#shine)"/>
  </g>
</svg>
