<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" role="img" aria-label="MD Ikramul Kayes, Backend and AI Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.5" stop-color="#0e75b6"/>
      <stop offset="1" stop-color="#6f42c1"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.5" stop-color="#6f42c1"/>
      <stop offset="1" stop-color="#0e75b6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="round"><rect x="0" y="0" width="1200" height="280" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect x="0" y="0" width="1200" height="280" fill="url(#bg)"/>

    <rect x="0" y="0" width="1200" height="280" fill="url(#bg2)" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="9s" repeatCount="indefinite"/>
    </rect>

    <g fill="#ffffff" opacity="0.06">
      <circle cx="1050" cy="60" r="120">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -16;0 0" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1150" cy="220" r="80">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 14;0 0" dur="7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="120" cy="230" r="90">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -12;0 0" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g fill="#ffffff" opacity="0.10" font-family="'Fira Code','Consolas',monospace" font-size="16">
      <text x="60" y="60">{ }</text>
      <text x="1020" y="150">&lt;/&gt;</text>
      <text x="90" y="120">def agent():</text>
    </g>

    <text x="600" y="128" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="66" font-weight="700" fill="#ffffff" letter-spacing="1" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="1s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="0 18" to="0 0" begin="0.1s" dur="1s" fill="freeze"/>
      MD Ikramul Kayes
    </text>

    <rect x="600" y="152" width="0" height="3" rx="1.5" fill="url(#line)">
      <animate attributeName="width" from="0" to="340" begin="0.6s" dur="0.9s" fill="freeze"/>
      <animate attributeName="x" from="600" to="430" begin="0.6s" dur="0.9s" fill="freeze"/>
    </rect>

    <text x="600" y="200" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="25" font-weight="500" fill="#e6f0fa" letter-spacing="0.5" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="1s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="0 18" to="0 0" begin="0.9s" dur="1s" fill="freeze"/>
      Backend and AI Engineer
    </text>

    <text x="600" y="236" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="17" fill="#bcd6ee" letter-spacing="2" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="1s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="0 18" to="0 0" begin="1.1s" dur="1s" fill="freeze"/>
      VOICE AGENTS  •  RAG  •  n8n  •  LLM ROUTING
    </text>

    <rect x="-400" y="0" width="150" height="280" fill="url(#shine)" transform="skewX(-18)">
      <animate attributeName="x" values="-400;1320;1320" keyTimes="0;0.55;1" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
